# =============================================================================
# ScriptChain Health – GitLab CI/CD Pipeline
# Node.js Application: Build → Test → Deploy
# Author: Richard Kweku Addae
#
# PIPELINE STAGES
# ───────────────
#   build   Install dependencies, lint, and compile the application
#   test    Run unit and integration tests with coverage reporting
#   deploy  Push artifact to S3, SSH into EC2, restart via PM2
#
# REQUIRED CI/CD VARIABLES  (GitLab → Settings → CI/CD → Variables)
# ──────────────────────────────────────────────────────────────────
#   AWS_ACCESS_KEY_ID        IAM key with S3 + EC2 permissions
#   AWS_SECRET_ACCESS_KEY    Corresponding secret  ← MASK THIS
#   AWS_DEFAULT_REGION       e.g. us-east-1
#   S3_BUCKET_NAME           Artifact storage bucket
#   EC2_HOST_STAGING         Public IP / hostname of staging server
#   EC2_HOST_PROD            Public IP / hostname of production server
#   EC2_SSH_KEY              Private key for SSH  ← MASK THIS
#   EC2_USER                 SSH login user (e.g. ec2-user)
# =============================================================================

default:
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/

stages:
  - build
  - test
  - deploy

# =============================================================================
# STAGE 1 – BUILD
# Install dependencies, lint, and compile. Passes dist/ as an artifact
# to the test and deploy stages so nothing is reinstalled twice.
# =============================================================================
build:
  stage: build
  script:
    - echo ">>> Installing dependencies"
    - npm ci
    - echo ">>> Linting source code"
    - npm run lint
    - echo ">>> Compiling application"
    - npm run build
  artifacts:
    paths:
      - dist/
      - node_modules/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# =============================================================================
# STAGE 2 – TEST
# Unit and integration tests run in parallel immediately after build.
# Coverage report is parsed by GitLab for the pipeline badge.
# =============================================================================
test:unit:
  stage: test
  needs: [build]
  script:
    - echo ">>> Running unit tests with coverage"
    - npm test -- --coverage --coverageReporters=text --coverageReporters=cobertura
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days

test:integration:
  stage: test
  needs: [build]
  script:
    - echo ">>> Running integration tests"
    - npm run test:integration
  allow_failure: false

# =============================================================================
# STAGE 3 – DEPLOY
#
# Staging     → auto on every push to main
# Production  → semver tag only (v1.0.0), manual approval required
#
# Flow: sync dist/ to S3 → SSH into EC2 → pull from S3 → PM2 restart
# =============================================================================

.ssh_setup: &ssh_setup
  - mkdir -p ~/.ssh
  - echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa

# ── Staging ──────────────────────────────────────────────────────────────────
deploy:staging:
  stage: deploy
  image: amazon/aws-cli
  needs: [test:unit, test:integration]
  before_script:
    - *ssh_setup
    - ssh-keyscan -H "$EC2_HOST_STAGING" >> ~/.ssh/known_hosts
  script:
    - echo ">>> Uploading artifact to S3 (staging)"
    - aws s3 sync dist/ s3://$S3_BUCKET_NAME/staging/ --delete
    - echo ">>> Deploying to staging EC2"
    - |
      ssh $EC2_USER@$EC2_HOST_STAGING << 'EOF'
        set -e
        cd /opt/app
        aws s3 sync s3://$S3_BUCKET_NAME/staging/ . --delete
        npm ci --omit=dev
        pm2 restart scriptchain-app || pm2 start dist/index.js --name scriptchain-app
        pm2 save
      EOF
  environment:
    name: staging
    url: http://$EC2_HOST_STAGING
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Production ───────────────────────────────────────────────────────────────
deploy:production:
  stage: deploy
  image: amazon/aws-cli
  needs: [test:unit, test:integration]
  before_script:
    - *ssh_setup
    - ssh-keyscan -H "$EC2_HOST_PROD" >> ~/.ssh/known_hosts
  script:
    - echo ">>> Archiving release $CI_COMMIT_TAG to S3"
    - aws s3 sync dist/ s3://$S3_BUCKET_NAME/releases/$CI_COMMIT_TAG/ --delete
    - echo ">>> Deploying $CI_COMMIT_TAG to production EC2"
    - |
      ssh $EC2_USER@$EC2_HOST_PROD << 'EOF'
        set -e
        cd /opt/app
        aws s3 sync s3://$S3_BUCKET_NAME/releases/$CI_COMMIT_TAG/ . --delete
        npm ci --omit=dev
        pm2 restart scriptchain-app || pm2 start dist/index.js --name scriptchain-app
        pm2 save
      EOF
  environment:
    name: production
    url: http://$EC2_HOST_PROD
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  when: manual